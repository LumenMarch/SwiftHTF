excluded:
  - .build
  - .swiftpm

disabled_rules:
  - todo
  - xctfail_message
  - multiple_closures_with_trailing_closure
  - inclusive_language
  - large_tuple
  # Conflicts with SwiftFormat's wrapMultilineStatementBraces; SwiftFormat owns brace placement.
  - opening_brace

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

type_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 100
  error: 150

type_body_length:
  warning: 320
  error: 500

file_length:
  warning: 600
  error: 1000

cyclomatic_complexity:
  warning: 15
  error: 25

trailing_comma:
  mandatory_comma: true
